# =============================================================================
# Appium CI — Android + iOS in parallel
# =============================================================================
#
# Android  →  GCP Compute Engine (self-hosted runner, nested KVM)
#             Label: self-hosted, linux, appium-android
#             One-time setup: ci/setup-android-runner-gcp.sh
#
# iOS      →  GitHub-hosted macOS runner (free for public repos)
#             No infrastructure to manage — GitHub provides Xcode + simulators
# =============================================================================

name: Appium Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - android
          - ios

jobs:

  # ── Android tests (GCP Compute Engine, self-hosted) ────────────────────────
  android:
    name: Android Emulator Tests
    runs-on: [self-hosted, linux, appium-android]
    timeout-minutes: 30
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Android emulator
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/android-sdk}"
          export PATH="$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

          # Create AVD if it doesn't exist yet
          if ! emulator -list-avds 2>/dev/null | grep -q "CIDevice"; then
            export ANDROID_SDK_ROOT="$ANDROID_HOME"
            echo "no" | avdmanager create avd \
              --name "CIDevice" \
              --package "system-images;android-36;google_apis;x86_64" \
              --device "pixel_6" \
              --force
          fi

          # Start headless with KVM acceleration
          nohup emulator \
            -avd CIDevice \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot-save \
            -accel on \
            > /tmp/emulator.log 2>&1 &

          # Wait for full boot (max 5 min)
          echo "Waiting for emulator boot..."
          timeout 300 bash -c '
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do
              sleep 5
            done
          '
          adb shell input keyevent 82
          echo "Emulator ready: $(adb devices | grep emulator)"

      - name: Start Appium server
        run: |
          export APPIUM_HOME="${APPIUM_HOME:-$HOME/.appium}"
          nohup appium \
            --port 4723 \
            --address 127.0.0.1 \
            --base-path / \
            --relaxed-security \
            --log-level warn \
            > /tmp/appium.log 2>&1 &

          timeout 30 bash -c '
            until curl -sf http://localhost:4723/status 2>/dev/null | grep -q "\"ready\":true"; do
              sleep 2
            done
          '
          echo "Appium ready"

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run Android tests
        working-directory: tests
        env:
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
        run: npm run test:android

      - name: Stop Appium and emulator
        if: always()
        run: |
          pkill -f "appium" 2>/dev/null || true
          adb emu kill 2>/dev/null || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: tests/screenshots/
          retention-days: 7

  # ── iOS tests (GitHub-hosted macOS runner — free for public repos) ─────────
  ios:
    name: iOS Simulator Tests
    runs-on: macos-latest
    timeout-minutes: 30
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.platform == 'ios' ||
      inputs.platform == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Appium and XCUITest driver
        run: |
          npm install -g appium
          appium driver install xcuitest
          echo "Appium $(appium --version) ready"

      - name: Start iOS Simulator
        run: |
          # Find best available iPhone simulator on this runner
          SIM_UDID=""
          for MODEL in "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            SIM_UDID=$(xcrun simctl list devices available 2>/dev/null \
              | grep "$MODEL" \
              | grep -oE '[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}' \
              | head -1 || true)
            [ -n "$SIM_UDID" ] && { echo "Using $MODEL ($SIM_UDID)"; break; }
          done

          if [ -z "$SIM_UDID" ]; then
            echo "No iPhone simulator found. Available simulators:"
            xcrun simctl list devices available | grep iPhone
            exit 1
          fi

          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true

          # Wait for boot — macOS has no 'timeout' command; use a counter loop
          MAX=30 ELAPSED=0   # 30 × 3 s = 90 s max
          until xcrun simctl list devices booted 2>/dev/null | grep -q "$SIM_UDID"; do
            if [ "$ELAPSED" -ge "$MAX" ]; then
              echo "Simulator did not boot within 90 s"; exit 1
            fi
            sleep 3; ELAPSED=$((ELAPSED + 1))
          done

          echo "IOS_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "Simulator ready"

      - name: Start Appium server
        run: |
          nohup appium \
            --port 4723 \
            --address 127.0.0.1 \
            --base-path / \
            --relaxed-security \
            --log-level warn \
            > /tmp/appium.log 2>&1 &

          # Wait for Appium — counter loop (no 'timeout' on macOS)
          MAX=30 ELAPSED=0   # 30 × 2 s = 60 s max
          until curl -sf http://localhost:4723/status 2>/dev/null | grep -q '"ready":true'; do
            if [ "$ELAPSED" -ge "$MAX" ]; then
              echo "Appium did not start within 60 s"
              cat /tmp/appium.log
              exit 1
            fi
            sleep 2; ELAPSED=$((ELAPSED + 1))
          done
          echo "Appium ready"

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run iOS tests
        working-directory: tests
        env:
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          IOS_UDID: ${{ env.IOS_UDID }}
        run: npm run test:ios

      - name: Stop Appium
        if: always()
        run: pkill -f "appium" 2>/dev/null || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: tests/screenshots/
          retention-days: 7

  # ── Final status ───────────────────────────────────────────────────────────
  report:
    name: Results
    runs-on: ubuntu-latest
    needs: [android, ios]
    if: always()
    steps:
      - name: Check results
        run: |
          ANDROID="${{ needs.android.result }}"
          IOS="${{ needs.ios.result }}"
          echo "Android: $ANDROID"
          echo "iOS:     $IOS"

          # 'skipped' means the job was excluded by the platform input — that's fine.
          # Only 'failure' or 'cancelled' should fail the overall run.
          if [[ "$ANDROID" == "failure" || "$ANDROID" == "cancelled" ]]; then
            echo "Android job failed."
            exit 1
          fi
          if [[ "$IOS" == "failure" || "$IOS" == "cancelled" ]]; then
            echo "iOS job failed."
            exit 1
          fi
          echo "All selected tests passed."
